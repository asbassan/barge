name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -ldflags "-X main.version=${{ github.ref_name }}" -o barge.exe ./cmd/barge

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: barge.exe
          generate_release_notes: true
